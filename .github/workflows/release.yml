name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
      
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradle cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }} 

    - name: Prepare build files # 步骤4: 准备构建所需的文件
      run: |
        # 解码base64编码的keystore文件
        # 注意：这里使用了你提供的 KEYSTORE_BASE64 Secret 名称
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/app.key
        
        # 写入签名配置到local.properties
        # 这些属性会被 app/build.gradle.kts 读取
        echo "storeFile=$(pwd)/app/app.key" >> local.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
        
        # 写入Google Services配置
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > app/google-services.json

# 尝试使用管道和 base64 -d
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    - name: Debug generated files content # !!! 新增的调试步骤 !!!
      run: |
        echo "--- Listing files in root directory ---"
        ls -l
        echo "--- Listing files in app directory ---"
        ls -l app/
        echo "--- Content of local.properties ---"
        cat local.properties
        echo "--- Checking app/app.key size ---"
        ls -l app/app.key
        echo "--- Content of app/google-services.json (first 1000 chars) ---"
        head -c 1000 app/google-services.json
        echo "--- Content of app/google-services.json (full) ---"
        cat app/google-services.json
        echo "--- Checking app/google-services.json size ---"
        ls -l app/google-services.json
        echo "--- Checking GOOGLE_SERVICES_JSON Secret length (for debugging) ---"
        echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | wc -c
        echo "--- Checking GOOGLE_SERVICES_JSON Secret (first 100 chars, for debugging) ---"
        echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | head -c 100
      env: # 确保这些 Secrets 在此步骤中可用
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }} # 只需要这个来检查长度和部分内容

    - name: Gradle Build
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: artifacts
        path: app/build/outputs/apk/release/*.apk
