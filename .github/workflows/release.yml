name: Release Build

on:
  # 只允许手动从 GitHub Actions UI 触发工作流
  workflow_dispatch:
    inputs:
      # 手动输入 APK 的版本名称 (例如: 1.0.0, 1.0.1-beta)
      version_name:
        description: 'APK Version Name (e.g., 1.0.0, 1.0.1-beta)'
        required: true # 必须填写
        default: '1.0.0' # 提供一个默认值，方便你第一次使用或测试
      # 手动输入 APK 的版本代码 (例如: 1, 2, 3 - 必须是递增的整数)
      version_code:
        description: 'APK Version Code (e.g., 1, 2, 3 - must be an integer)'
        required: true # 必须填写
        default: '1' # 提供一个默认值

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整的历史记录

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradle cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }} 

    - name: Inject Manual Version Info # 【新增】步骤：注入手动输入的版本信息到 gradle.properties
      run: |
        # 获取手动输入的版本号
        VERSION_NAME="${{ github.event.inputs.version_name }}"
        VERSION_CODE="${{ github.event.inputs.version_code }}"

        echo "Injecting VERSION_CODE=$VERSION_CODE and VERSION_NAME=$VERSION_NAME into gradle.properties"
        
        # 更新 gradle.properties 文件
        # 使用 sed 命令替换或添加 VERSION_CODE 和 VERSION_NAME
        # 如果文件不存在这些行，则添加
        sed -i "/^VERSION_CODE=/c\VERSION_CODE=$VERSION_CODE" gradle.properties || echo "VERSION_CODE=$VERSION_CODE" >> gradle.properties
        sed -i "/^VERSION_NAME=/c\VERSION_NAME=$VERSION_NAME" gradle.properties || echo "VERSION_NAME=$VERSION_NAME" >> gradle.properties
        
        echo "Updated gradle.properties content:"
        cat gradle.properties # 打印更新后的内容，方便调试

    - name: Prepare build files # 准备构建所需的文件 (保持不变)
      run: |
        # 解码base64编码的keystore文件
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/app.key
        
        # 写入签名配置到local.properties
        echo "storeFile=$(pwd)/app/app.key" >> local.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
        
        # 写入Google Services配置
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > app/google-services.json
      env: # 确保这些 Secrets 在此步骤中可用
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    - name: Gradle Build
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK as Artifact # 将构建产物作为 Artifact 上传，方便调试和临时下载
      uses: actions/upload-artifact@v4
      if: success() # 只有当上一步成功时才执行
      with:
        name: release-apk # 更改 Artifact 的名称，使其更明确
        path: app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release # 创建 GitHub Release 并上传 APK
      id: create_release
      uses: softprops/action-gh-release@v1
      if: success() # 只有当上一步成功时才执行
      with:
        files: app/build/outputs/apk/release/*.apk # 指定要上传到 Release 的文件
        # Release 的名称和 Tag 都使用手动输入的 versionName
        # 建议 Tag 加上 'v' 前缀，这是惯例，方便管理
        tag_name: v${{ github.event.inputs.version_name }} 
        name: Release ${{ github.event.inputs.version_name }}
        body: | # Release 的说明文本
          Manual release for version **${{ github.event.inputs.version_name }}** (Code: ${{ github.event.inputs.version_code }}).
          
          This release includes the latest features and bug fixes.
          
          **Download:**
          - `app-release.apk` (Android Application Package)
          
          ---
          *Generated by GitHub Actions*
        draft: false # 设置为 false 会立即发布 Release
        prerelease: false # 设置为 false 表示这是一个正式版本
      env:
        # GITHUB_TOKEN 是 GitHub Actions 自动提供的，用于认证
        # 拥有对仓库的写入权限，足以创建 Release
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
