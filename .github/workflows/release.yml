name: Release Build

on:
  # 当有新的 Git Tag 被推送到仓库时触发此工作流
  # 例如：git tag v1.0.0 && git push --tags
  push:
    tags:
      - 'v*' # 匹配所有以 'v' 开头的标签，例如 v1.0.0, v1.2.3, v-beta 等

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整的历史记录，以便后续创建 Release 时获取 Tag 信息

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradle cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }} 

    - name: Prepare build files # 准备构建所需的文件
      run: |
        # 解码base64编码的keystore文件
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/app.key
        
        # 写入签名配置到local.properties
        echo "storeFile=$(pwd)/app/app.key" >> local.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
        
        # 写入Google Services配置
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > app/google-services.json
      env: # 确保这些 Secrets 在此步骤中可用
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    - name: Gradle Build
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK as Artifact # 将构建产物作为 Artifact 上传，方便调试和临时下载
      uses: actions/upload-artifact@v4
      if: success() # 只有当上一步成功时才执行
      with:
        name: release-apk # 更改 Artifact 的名称，使其更明确
        path: app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release # 新增步骤：创建 GitHub Release 并上传 APK
      id: create_release
      uses: softprops/action-gh-release@v1
      if: success() # 只有当上一步成功时才执行
      with:
        files: app/build/outputs/apk/release/*.apk # 指定要上传到 Release 的文件
        name: Release ${{ github.ref_name }} # Release 的名称，例如 "Release v1.0.0"
        tag_name: ${{ github.ref }} # 使用当前的 Git Tag 作为 Release 的标签
        body: | # Release 的说明文本
          Automated release for version **${{ github.ref_name }}**.
          
          This release includes the latest features and bug fixes.
          
          **Download:**
          - `app-release.apk` (Android Application Package)
          
          ---
          *Generated by GitHub Actions*
        draft: false # 设置为 false 会立即发布 Release
        prerelease: false # 设置为 false 表示这是一个正式版本
      env:
        # GITHUB_TOKEN 是 GitHub Actions 自动提供的，用于认证
        # 拥有对仓库的写入权限，足以创建 Release
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

